version: '3.8'

services:
  agy-gw:
    build: .
    container_name: agy-gw-commercial
    restart: always
    network_mode: "host"
    environment:
      - PORT=8789
      - HOST=127.0.0.1
      - AGY_BIN=/usr/local/bin/agy
      - MAX_CONCURRENT=5
      - LOG_LEVEL=INFO
      - ANTIGRAVITY_AGENT=1
      - HOME=/root
      - ANTIGRAVITY_LS_ADDRESS=localhost:13723
      - ANTIGRAVITY_CSRF_TOKEN=
      - ANTIGRAVITY_PROJECT_ID=2af174aa-0852-4888-ad53-1bc88c32de06
      - ANTIGRAVITY_TRAJECTORY_ID=b1d1cf83-4fdd-402d-a39a-d742980868e1
      - SSH_CLIENT=127.0.0.1 1 1
    volumes:
      - /etc/machine-id:/etc/machine-id:ro
      - /var/lib/dbus/machine-id:/var/lib/dbus/machine-id:ro
      # 关键：挂载宿主机的认证 Token 目录
      - /root/.gemini:/root/.gemini
      # 关键：挂载 agy 二进制文件 (使用已打补丁延长超时为 180s 的版本)
      - /root/.local/bin/agy_patched:/usr/local/bin/agy
      # 挂载宿主机的项目根目录（如果需要 agy 操作宿主机文件）
      - /root:/root
    logging:
      driver: "json-file"
      options:
        max-size: "10mb"
        max-file: "3"
